server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"

database:
  host: "localhost"
  port: 5432
  user: "hjtpx_user"
  password: "hjtpx_password"
  dbname: "hjtpx"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

redis:
  host: "localhost"
  port: 6379
  password: "hjtpx_redis_pass"
  db: 0
  pool_size: 10

log:
  level: "info"
  format: "json"
  output: "stdout"

captcha:
  expire_minutes: 5
  max_attempts: 3
  width: 200
  height: 80
  length: 4
  slider_size: 50
  tolerance: 5

admin:
  jwt_secret: "captchax-admin-jwt-secret-change-in-production-2026"
  token_ttl_seconds: 86400
  cookie_name: "admin_token"
