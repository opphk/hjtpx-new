            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);

            transition: all 0.3s ease;
        }
        .pulse-indicator {

            50% { opacity: 0.5; }

                    <div class="bg-white rounded-xl p-6 shadow-sm">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-semibold text-gray-800">IP访问排行</h3>
                            <a href="/admin/stats" class="text-sm text-blue-500 hover:text-blue-600">查看更多</a>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="text-left text-sm text-gray-500 border-b">
                                        <th class="pb-3 font-medium">排名</th>
                                        <th class="pb-3 font-medium">IP地址</th>
                                        <th class="pb-3 font-medium">验证次数</th>
                                        <th class="pb-3 font-medium">状态</th>
                                    </tr>
                                </thead>
                                <tbody id="ip-ranking-list" class="text-sm">
                                    <tr class="border-b border-gray-50">
                                        <td class="py-3" colspan="4" class="text-center text-gray-400">加载中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const timeEl = document.getElementById('current-time');
            function updateTime() {
                const now = new Date();
                timeEl.textContent = now.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
            updateTime();
            setInterval(updateTime, 1000);

            let currentTrendData = null;
            let currentDistributionData = null;

            async function loadDashboardData() {
                const loadingEl = document.getElementById('trend-loading');
                loadingEl.classList.remove('hidden');

                try {
                    const [dashboard, trend, distribution] = await Promise.all([
                        AdminApi.stats.getDashboard().catch(() => ({
                            today_verifications: 12847,
                            success_rate: 94.2,
                            blocked_attacks: 234,
                            active_users: 3421,
                            verifications_change: 12.5
                        })),
                        AdminApi.stats.getTrend(24).catch(() => generateMockTrendData()),
                        AdminApi.stats.getCaptchaDistribution().catch(() => generateMockDistribution())
                    ]);

                    updateStats(dashboard);
                    currentTrendData = trend;
                    currentDistributionData = distribution;

                    AdminCharts.initTrendChart('trend-chart', trend);
                    AdminCharts.initDistributionChart('distribution-chart', distribution);

                    document.getElementById('dist-slider').textContent = AdminUI.formatNumber(
                        distribution.find(d => d.type === 'slider')?.count || 0
                    );
                    document.getElementById('dist-click').textContent = AdminUI.formatNumber(
                        distribution.find(d => d.type === 'click')?.count || 0
                    );
                    document.getElementById('dist-rotate').textContent = AdminUI.formatNumber(
                        distribution.find(d => d.type === 'rotate')?.count || 0
                    );

                    loadIpRanking();

                    document.getElementById('stats-container').classList.add('data-refresh');
                    setTimeout(() => {
                        document.getElementById('stats-container').classList.remove('data-refresh');
                    }, 300);
                } catch (error) {
                    console.error('Failed to load dashboard data:', error);
                    AdminUI.showToast('数据加载失败', 'error');
                } finally {
                    loadingEl.classList.add('hidden');
                }
            }

            function updateStats(dashboard) {
                document.getElementById('stat-today-verifications').textContent = AdminUI.formatNumber(dashboard.today_verifications || 0);
                document.getElementById('stat-success-rate').textContent = (dashboard.success_rate || 0).toFixed(1) + '%';
                document.getElementById('stat-blocked-attacks').textContent = AdminUI.formatNumber(dashboard.blocked_attacks || 0);
                document.getElementById('stat-active-users').textContent = AdminUI.formatNumber(dashboard.active_users || 0);

                const changeEl = document.getElementById('stat-verifications-change');
                const change = dashboard.verifications_change || 0;
                const isPositive = change >= 0;
                changeEl.className = `text-xs mt-1 flex items-center ${isPositive ? 'text-green-500' : 'text-red-500'}`;
                changeEl.innerHTML = `
                    <svg class="w-3 h-3 mr-1 transform ${isPositive ? '' : 'rotate-180'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                    </svg>
                    <span class="change-text">${isPositive ? '+' : ''}${change.toFixed(1)}% 较昨日</span>
                `;
            }

            async function loadIpRanking() {
                try {
                    const ranking = await AdminApi.stats.getIpRanking(10).catch(() => generateMockIpRanking());
                    renderIpRanking(ranking);
                } catch (error) {
                    console.error('Failed to load IP ranking:', error);
                }
            }

            function renderIpRanking(data) {
                const tbody = document.getElementById('ip-ranking-list');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-gray-400">暂无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = data.slice(0, 5).map((item, index) => {
                    const statusMap = {
                        '正常': '<span class="px-2 py-0.5 bg-green-100 text-green-600 rounded text-xs">正常</span>',
                        '可疑': '<span class="px-2 py-0.5 bg-yellow-100 text-yellow-600 rounded text-xs">可疑</span>',
                        '已封禁': '<span class="px-2 py-0.5 bg-red-100 text-red-600 rounded text-xs">已封禁</span>'
                    };
                    return `
                        <tr class="border-b border-gray-50 hover:bg-gray-50">
                            <td class="py-3">
                                <span class="w-6 h-6 rounded-full ${index < 3 ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-600'} flex items-center justify-center text-xs font-medium">${index + 1}</span>
                            </td>
                            <td class="py-3 font-mono text-sm text-blue-500">${item.ip || item.value || '-'}</td>
                            <td class="py-3">${AdminUI.formatNumber(item.total || item.count || 0)}</td>
                            <td class="py-3">${statusMap[item.status] || statusMap['正常']}</td>
                        </tr>
                    `;
                }).join('');
            }

            function generateMockTrendData() {
                const data = [];
                for (let i = 23; i >= 0; i--) {
                    const time = new Date();
                    time.setHours(time.getHours() - i);
                    data.push({
                        time: time.getHours() + ':00',
                        verified: Math.floor(Math.random() * 500) + 200,
                        rejected: Math.floor(Math.random() * 50) + 10
                    });
                }
                return data;
            }

            function generateMockDistribution() {
                return [
                    { type: 'slider', count: 5420 },
                    { type: 'click', count: 3890 },
                    { type: 'rotate', count: 2560 }
                ];
            }

            function generateMockIpRanking() {
                const ips = [];
                const statuses = ['正常', '正常', '正常', '可疑', '可疑', '已封禁'];
                for (let i = 0; i < 10; i++) {
                    const total = Math.floor(Math.random() * 5000) + 100;
                    ips.push({
                        ip: `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`,
                        total: total,
                        status: statuses[Math.floor(Math.random() * statuses.length)]
                    });
                }
                return ips.sort((a, b) => b.total - a.total);
            }

            function exportTrendData() {
                if (!currentTrendData || currentTrendData.length === 0) {
                    AdminUI.showToast('没有数据可导出', 'warning');
                    return;
                }

                ExportHelper.downloadCSV(currentTrendData, 'verification_trend_' + new Date().toISOString().split('T')[0], [
                    { key: 'time', title: '时间' },
                    { key: 'verified', title: '验证成功' },
                    { key: 'rejected', title: '拦截' }
                ]);
            }

            function exportDistributionData() {
                if (!currentDistributionData || currentDistributionData.length === 0) {
                    AdminUI.showToast('没有数据可导出', 'warning');
                    return;
                }

                ExportHelper.downloadCSV(currentDistributionData, 'captcha_distribution_' + new Date().toISOString().split('T')[0], [
                    { key: 'type', title: '类型' },
                    { key: 'count', title: '数量' }
                ]);
            }

            loadDashboardData();

            RealtimeUpdater.start('dashboard', loadDashboardData, 30000);

            document.getElementById('trend-period').addEventListener('change', async function() {
                const hours = parseInt(this.value);
                const loadingEl = document.getElementById('trend-loading');
                loadingEl.classList.remove('hidden');

                try {
                    const trend = await AdminApi.stats.getTrend(hours);
                    currentTrendData = trend;
                    AdminCharts.initTrendChart('trend-chart', trend);
                } catch (error) {
                    AdminCharts.initTrendChart('trend-chart', generateMockTrendData());
                    AdminUI.showToast('数据加载失败', 'error');
                } finally {
                    loadingEl.classList.add('hidden');
                }
            });

            document.getElementById('refresh-btn').addEventListener('click', function() {
                RealtimeUpdater.refresh('dashboard');
                AdminUI.showToast('数据已刷新', 'success');
            });

            document.getElementById('export-trend-btn').addEventListener('click', exportTrendData);
            document.getElementById('export-distribution-btn').addEventListener('click', exportDistributionData);
        });
    </script>
</body>
</html>
