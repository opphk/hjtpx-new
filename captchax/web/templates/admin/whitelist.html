<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白名单管理 - CaptchaX 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-link:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }
        .sidebar-link.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-left: 3px solid #3b82f6;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        input.border-red-500, select.border-red-500 {
            border-color: #ef4444;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-full flex flex-col">
                <div class="p-6 border-b border-gray-100">

                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="font-bold text-gray-800">CaptchaX</h1>
                            <p class="text-xs text-gray-500">管理后台</p>
                        </div>
                    </div>
                </div>

                <nav class="flex-1 py-4 overflow-y-auto">
                    <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">主菜单</div>
                    <a href="/admin/dashboard" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        仪表盘

                    <a href="/admin/stats" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">

                    </a>
                    <a href="/admin/config" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        系统配置
                    </a>

                    <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">安全管控</div>
                    <a href="/admin/whitelist" class="sidebar-link active flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        白名单
                    </a>
                    <a href="/admin/blacklist" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        黑名单
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-700">管理员</p>
                                <p class="text-xs text-gray-500">在线</p>
                            </div>
                        </div>
                        <button id="logout-btn" class="p-2 text-gray-400 hover:text-red-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>

        </aside>

        <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
            <header class="bg-white shadow-sm sticky top-0 z-20">
                <div class="flex items-center justify-between px-6 py-4">
                    <button id="mobile-menu-btn" class="lg:hidden p-2 text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800">白名单管理</h2>
                    <div class="flex items-center space-x-3">
                        <button id="export-btn" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg flex items-center transition">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            导出
                        </button>
                        <button id="add-whitelist-btn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg flex items-center transition">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>

            <div id="batch-action-bar" class="hidden bg-blue-50 border-b border-blue-100 px-6 py-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-700">
                            已选择 <span id="selected-count" class="font-semibold text-blue-600">0</span> 项
                        </span>
                        <button id="clear-selection-btn" class="text-sm text-gray-500 hover:text-gray-700">清空选择</button>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button id="batch-delete-btn" class="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-600 rounded-lg text-sm transition flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                            批量删除
                        </button>
                    </div>
                </div>
            </div>

            <main class="flex-1 p-6">
                <div class="bg-white rounded-xl shadow-sm mb-6">
                    <div class="p-6 border-b border-gray-100">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <div class="flex-1">
                                <div class="relative max-w-md">
                                    <input type="text" id="search-input" placeholder="搜索IP地址、备注..."
                                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                            </div>
                            <div class="flex items-center space-x-3">
                                <select id="type-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">全部类型</option>
                                    <option value="ip">IP地址</option>
                                    <option value="ip_range">IP段</option>
                                    <option value="user_id">用户ID</option>
                                </select>
                                <button id="refresh-btn" class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table id="whitelist-table-element" class="w-full">
                            <thead>
                                <tr class="text-left text-sm text-gray-500 bg-gray-50">
                                    <th class="px-6 py-3 font-medium w-12">
                                        <input type="checkbox" class="master-checkbox w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500">
                                    </th>
                                    <th class="px-6 py-3 font-medium">类型</th>
                                    <th class="px-6 py-3 font-medium">值</th>
                                    <th class="px-6 py-3 font-medium">备注</th>
                                    <th class="px-6 py-3 font-medium">添加人</th>
                                    <th class="px-6 py-3 font-medium">添加时间</th>
                                    <th class="px-6 py-3 font-medium">过期时间</th>
                                    <th class="px-6 py-3 font-medium">操作</th>
                                </tr>
                            </thead>
                            <tbody id="whitelist-table" class="divide-y divide-gray-100">
                            </tbody>
                        </table>
                    </div>

                    <div id="whitelist-pagination" class="p-4 border-t border-gray-100 flex justify-center"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white rounded-xl p-6 shadow-sm">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                            统计信息
                        </h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-500">白名单总数</span>
                                <span class="font-semibold text-gray-800" id="total-count">0</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-500">IP地址</span>
                                <span class="font-semibold text-gray-800" id="ip-count">0</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-500">IP段</span>
                                <span class="font-semibold text-gray-800" id="range-count">0</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-500">用户ID</span>
                                <span class="font-semibold text-gray-800" id="user-count">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 bg-white rounded-xl p-6 shadow-sm">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">白名单使用说明</h3>
                        <div class="text-sm text-gray-600 space-y-3">
                            <div class="flex items-start">
                                <span class="w-6 h-6 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xs font-medium mr-3 flex-shrink-0">1</span>
                                <p>白名单中的IP或用户将跳过所有验证码验证流程</p>
                            </div>
                            <div class="flex items-start">
                                <span class="w-6 h-6 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xs font-medium mr-3 flex-shrink-0">2</span>
                                <p>支持单个IP地址（如 192.168.1.1）和IP段（如 192.168.1.0/24）</p>
                            </div>
                            <div class="flex items-start">
                                <span class="w-6 h-6 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xs font-medium mr-3 flex-shrink-0">3</span>
                                <p>白名单可以设置过期时间，过期后自动失效</p>
                            </div>
                            <div class="flex items-start">
                                <span class="w-6 h-6 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xs font-medium mr-3 flex-shrink-0">4</span>
                                <p>请谨慎添加白名单，确保来源可信</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-semibold text-gray-800">添加白名单</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></svg>
                    </button>
            </div>

            <form id="add-whitelist-form" class="space-y-4">
                <div class="form-group">
                    <label class="block text-sm font-medium text-gray-700 mb-2">类型</label>
                    <select id="wl-type" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="ip">单个IP地址</option>
                        <option value="ip_range">IP段</option>
                        <option value="user_id">用户ID</option>
                    </select>
                </div>

                <div class="form-group" id="ip-input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-2">IP地址</label>
                    <input type="text" id="wl-value" required placeholder="例如: 192.168.1.1"
                        data-validate='["required", "ip"]'
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="form-group">
                    <label class="block text-sm font-medium text-gray-700 mb-2">备注</label>
                    <input type="text" id="wl-remark" placeholder="请输入备注信息（可选）" maxlength="200"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="form-group">
                    <label class="block text-sm font-medium text-gray-700 mb-2">过期时间</label>
                    <div class="flex items-center space-x-2">
                        <input type="datetime-local" id="wl-expire-time"
                            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="wl-no-expire" checked class="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-600">永不过期</span>
                        </label>
                    </div>
                </div>

                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" id="cancel-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        取消
                    </button>
                    <button type="submit" id="submit-btn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition flex items-center">
                        <svg class="w-4 h-4 mr-2 hidden animate-spin" id="submit-spinner" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        添加
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentPage = 1;
            let pageSize = 20;
            let searchKeyword = '';
            let typeFilter = '';
            let tableData = [];

            BatchOperations.init('whitelist-table-element', 'row-checkbox');

            function renderTable(data) {
                const tbody = document.getElementById('whitelist-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8" class="px-6 py-12 text-center text-gray-500">
                                <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                暂无数据
                            </td>
                        </tr>
                    `;
                    return;
                }

                tableData = data;

                tbody.innerHTML = data.map(item => {
                    const typeMap = {
                        'ip': '<span class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-xs">IP</span>',
                        'ip_range': '<span class="px-2 py-1 bg-purple-100 text-purple-600 rounded text-xs">IP段</span>',
                        'user_id': '<span class="px-2 py-1 bg-green-100 text-green-600 rounded text-xs">用户</span>'
                    };

                    const expireText = item.expire_time ? AdminUI.formatDate(item.expire_time) : '永不过期';
                    const expireClass = item.expire_time && new Date(item.expire_time) < new Date() ? 'text-red-500' : '';

                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4">
                                <input type="checkbox" class="row-checkbox w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500" data-id="${item.id}">
                            </td>
                            <td class="px-6 py-4">${typeMap[item.type] || item.type}</td>
                            <td class="px-6 py-4 font-mono text-sm">${item.value}</td>
                            <td class="px-6 py-4 text-gray-600 max-w-xs truncate" title="${item.remark || ''}">${item.remark || '-'}</td>
                            <td class="px-6 py-4">${item.created_by || '系统'}</td>
                            <td class="px-6 py-4 text-gray-500">${AdminUI.formatDate(item.created_at)}</td>
                            <td class="px-6 py-4 text-gray-500 ${expireClass}">${expireText}</td>
                            <td class="px-6 py-4">
                                <button onclick="deleteWhitelist(${item.id})" class="text-red-500 hover:text-red-700 transition" title="删除">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');

                BatchOperations.updateMasterCheckbox();
            }

            async function loadWhitelist() {
                try {
                    const result = await AdminApi.whitelist.list(currentPage, pageSize, searchKeyword, typeFilter);
                    const data = result.items || result.data || [];
                    renderTable(data);

                    AdminUI.Pagination.init('whitelist-pagination', pageSize, (page) => {
                        currentPage = page;
                        loadWhitelist();
                    });
                    AdminUI.Pagination.setTotal(result.total || 0);

                    updateStats(data);
                } catch (error) {
                    console.error('Failed to load whitelist:', error);
                    renderTable(generateMockData());
                }
            }

            function updateStats(data) {
                const total = data.length;
                const ipCount = data.filter(d => d.type === 'ip').length;
                const rangeCount = data.filter(d => d.type === 'ip_range').length;
                const userCount = data.filter(d => d.type === 'user_id').length;

                document.getElementById('total-count').textContent = total;
                document.getElementById('ip-count').textContent = ipCount;
                document.getElementById('range-count').textContent = rangeCount;
                document.getElementById('user-count').textContent = userCount;
            }

            function generateMockData() {
                const types = ['ip', 'ip_range', 'user_id'];
                const data = [];
                for (let i = 0; i < 10; i++) {
                    const type = types[Math.floor(Math.random() * types.length)];
                    data.push({
                        id: i + 1,
                        type: type,
                        value: type === 'ip' ? `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}` :
                               type === 'ip_range' ? `10.${Math.floor(Math.random() * 255)}.0.0/24` :
                               `user_${Math.floor(Math.random() * 10000)}`,
                        remark: ['内部网络', '测试服务器', '合作伙伴', 'VIP用户'][Math.floor(Math.random() * 4)],
                        created_by: 'admin',
                        created_at: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString(),
                        expire_time: Math.random() > 0.5 ? new Date(Date.now() + Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString() : null
                    });
                }
                return data;
            }

            window.deleteWhitelist = async function(id) {
                const confirmed = await AdminUI.confirm('确定要删除这条白名单记录吗？');
                if (confirmed) {
                    try {
                        await AdminApi.whitelist.delete(id);
                        AdminUI.showToast('删除成功', 'success');
                        loadWhitelist();
                    } catch (error) {
                        AdminUI.showToast('删除失败: ' + error.message, 'error');
                    }
                }
            };

            async function batchDeleteSelected() {
                const selected = BatchOperations.getSelected();
                if (selected.length === 0) return;

                const confirmed = await AdminUI.confirm(`确定要删除选中的 ${selected.length} 条记录吗？此操作不可撤销。`, '批量删除确认');
                if (confirmed) {
                    try {
                        const submitBtn = document.getElementById('submit-btn');
                        AdminUI.showLoading(submitBtn, '删除中...');

                        await AdminApi.whitelist.batchDelete(selected);
                        AdminUI.showToast(`成功删除 ${selected.length} 条记录`, 'success');
                        BatchOperations.clearSelection();
                        loadWhitelist();
                    } catch (error) {
                        AdminUI.showToast('批量删除失败: ' + error.message, 'error');
                    } finally {
                        const submitBtn = document.getElementById('submit-btn');
                        AdminUI.hideLoading(submitBtn);
                    }
                }
            }

            function openAddModal() {
                document.getElementById('add-modal').classList.remove('hidden');
                document.getElementById('add-whitelist-form').reset();
                document.getElementById('wl-no-expire').checked = true;
                document.getElementById('wl-expire-time').disabled = true;
                FormValidator.initFormValidation(document.getElementById('add-whitelist-form'));
            }

            function closeAddModal() {
                document.getElementById('add-modal').classList.add('hidden');
            }

            document.getElementById('add-whitelist-btn').addEventListener('click', openAddModal);
            document.getElementById('close-modal-btn').addEventListener('click', closeAddModal);
            document.getElementById('cancel-btn').addEventListener('click', closeAddModal);

            document.getElementById('add-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeAddModal();
                }
            });

            document.getElementById('wl-no-expire').addEventListener('change', function() {
                document.getElementById('wl-expire-time').disabled = this.checked;
            });

            document.getElementById('wl-type').addEventListener('change', function() {
                const label = document.querySelector('label[for="wl-value"]');
                const input = document.getElementById('wl-value');
                const inputGroup = document.getElementById('ip-input-group');

                if (this.value === 'ip') {
                    label.textContent = 'IP地址';
                    input.placeholder = '例如: 192.168.1.1';
                    input.dataset.validate = '["required", "ipv4"]';
                    inputGroup.classList.remove('hidden');
                } else if (this.value === 'ip_range') {
                    label.textContent = 'IP段';
                    input.placeholder = '例如: 192.168.1.0/24';
                    input.dataset.validate = '["required", "ipv4Cidr"]';
                    inputGroup.classList.remove('hidden');
                } else {
                    label.textContent = '用户ID';
                    input.placeholder = '请输入用户ID';
                    input.dataset.validate = '["required"]';
                    inputGroup.classList.add('hidden');
                }
                FormValidator.initFormValidation(document.getElementById('add-whitelist-form'));
            });

            document.getElementById('add-whitelist-form').addEventListener('submit', async function(e) {
                e.preventDefault();

                const form = this;
                if (!FormValidator.validateForm(form)) {
                    AdminUI.showToast('请检查表单输入', 'warning');
                    return;
                }

                const type = document.getElementById('wl-type').value;
                const value = document.getElementById('wl-value').value.trim();
                const remark = document.getElementById('wl-remark').value.trim();
                const noExpire = document.getElementById('wl-no-expire').checked;
                let expireTime = null;

                if (!noExpire) {
                    expireTime = document.getElementById('wl-expire-time').value;
                }

                if (type !== 'user_id' && !value) {
                    AdminUI.showToast('请输入值', 'error');
                    return;
                }

                const submitBtn = document.getElementById('submit-btn');
                const spinner = document.getElementById('submit-spinner');
                submitBtn.disabled = true;
                spinner.classList.remove('hidden');

                try {
                    await AdminApi.whitelist.add({ type, value, remark, expire_time: expireTime });
                    AdminUI.showToast('添加成功', 'success');
                    closeAddModal();
                    loadWhitelist();
                } catch (error) {
                    AdminUI.showToast('添加失败: ' + error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                    spinner.classList.add('hidden');
                }
            });

            let searchTimeout;
            document.getElementById('search-input').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    searchKeyword = this.value.trim();
                    currentPage = 1;
                    loadWhitelist();
                }, 300);
            });

            document.getElementById('type-filter').addEventListener('change', function() {
                typeFilter = this.value;
                currentPage = 1;
                loadWhitelist();
            });

            document.getElementById('refresh-btn').addEventListener('click', loadWhitelist);

            document.getElementById('clear-selection-btn').addEventListener('click', function() {
                BatchOperations.clearSelection();
            });

            document.getElementById('batch-delete-btn').addEventListener('click', batchDeleteSelected);

            document.getElementById('export-btn').addEventListener('click', function() {
                const columns = [
                    { key: 'type', title: '类型', formatter: (val) => ({ 'ip': 'IP地址', 'ip_range': 'IP段', 'user_id': '用户ID' }[val] || val) },
                    { key: 'value', title: '值' },
                    { key: 'remark', title: '备注' },
                    { key: 'created_by', title: '添加人' },
                    { key: 'created_at', title: '添加时间', formatter: (val) => AdminUI.formatDate(val) },
                    { key: 'expire_time', title: '过期时间', formatter: (val) => val ? AdminUI.formatDate(val) : '永不过期' }
                ];

                ExportHelper.exportTable('whitelist-table-element', 'whitelist_export', columns);
            });

            loadWhitelist();
        });
    </script>
</body>
</html>
