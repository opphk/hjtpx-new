    <script src="/static/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentTrendData = null;
            let currentDistributionData = null;
            let currentResultData = null;

            async function loadStats() {
                try {
                    const [dashboard, trend, distribution, results] = await Promise.all([
                        AdminApi.stats.getDashboard().catch(() => generateMockDashboard()),
                        AdminApi.stats.getTrend(24).catch(() => generateMockTrendData()),
                        AdminApi.stats.getCaptchaDistribution().catch(() => generateMockDistribution()),
                        AdminApi.stats.getResultStats().catch(() => generateMockResultStats())
                    ]);

                    updateSummaryStats(dashboard);
                    currentTrendData = trend;
                    currentDistributionData = distribution;
                    currentResultData = results;

                    AdminCharts.initTrendChart('trend-chart', trend, {
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    });

                    AdminCharts.initDistributionChart('distribution-chart', distribution, {
                        legendPosition: 'bottom',
                        colors: ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981']
                    });

                    AdminCharts.initResultChart('result-chart', results);

                    loadIpRanking();
                    loadDailyStats();

                } catch (error) {
                    console.error('Failed to load stats:', error);
                    AdminUI.showToast('数据加载失败', 'error');
                }
            }

            function updateSummaryStats(dashboard) {
                document.getElementById('stat-total').textContent = AdminUI.formatNumber(dashboard.total_verifications || 0);
                document.getElementById('stat-success-rate').textContent = (dashboard.success_rate || 0).toFixed(1) + '%';
                document.getElementById('stat-blocked').textContent = AdminUI.formatNumber(dashboard.total_blocked || 0);
                document.getElementById('stat-avg-time').textContent = (dashboard.avg_response_time || 0) + 'ms';
            }

            async function loadIpRanking() {
                try {
                    const ranking = await AdminApi.stats.getIpRanking(10).catch(() => generateMockIpRanking());
                    renderIpRanking(ranking);
                } catch (error) {
                    console.error('Failed to load IP ranking:', error);
                }
            }

            function renderIpRanking(data) {
                const tbody = document.getElementById('ip-ranking-table');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="py-4 text-center text-gray-400">暂无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = data.slice(0, 10).map((item, index) => {
                    const statusMap = {
                        '正常': '<span class="px-2 py-0.5 bg-green-100 text-green-600 rounded text-xs">正常</span>',
                        '可疑': '<span class="px-2 py-0.5 bg-yellow-100 text-yellow-600 rounded text-xs">可疑</span>',
                        '已封禁': '<span class="px-2 py-0.5 bg-red-100 text-red-600 rounded text-xs">已封禁</span>'
                    };
                    const successRate = item.success_rate || ((item.verified / item.total) * 100).toFixed(1);
                    const successClass = successRate >= 90 ? 'text-green-600' : successRate >= 70 ? 'text-yellow-600' : 'text-red-600';

                    return `
                        <tr class="border-b border-gray-50 hover:bg-gray-50">
                            <td class="py-3">
                                <span class="w-6 h-6 rounded-full ${index < 3 ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-600'} flex items-center justify-center text-xs font-medium">${index + 1}</span>
                            </td>
                            <td class="py-3 font-mono text-sm">${item.ip}</td>
                            <td class="py-3">${AdminUI.formatNumber(item.total || 0)}</td>
                            <td class="py-3 ${successClass}">${successRate}%</td>
                            <td class="py-3">${statusMap[item.status] || statusMap['正常']}</td>
                        </tr>
                    `;
                }).join('');
            }

            function loadDailyStats() {
                const dailyData = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;
                    dailyData.push({
                        label: dateStr,
                        value: Math.floor(Math.random() * 5000) + 3000
                    });
                }

                AdminCharts.initBarChart('daily-chart', {
                    labels: dailyData.map(d => d.label),
                    values: dailyData.map(d => d.value)
                }, {
                    label: '验证量',
                    colors: 'rgba(59, 130, 246, 0.5)',
                    borderColors: 'rgba(59, 130, 246, 1)'
                });
            }

            function generateMockDashboard() {
                return {
                    total_verifications: 128456,
                    success_rate: 94.2,
                    total_blocked: 2345,
                    avg_response_time: 125
                };
            }

            function generateMockTrendData() {
                const data = [];
                for (let i = 23; i >= 0; i--) {
                    const time = new Date();
                    time.setHours(time.getHours() - i);
                    data.push({
                        time: time.getHours() + ':00',
                        verified: Math.floor(Math.random() * 500) + 200,
                        rejected: Math.floor(Math.random() * 50) + 10
                    });
                }
                return data;
            }

            function generateMockDistribution() {
                return [
                    { type: 'slider', label: '滑动验证码', count: 5420 },
                    { type: 'click', label: '点选验证码', count: 3890 },
                    { type: 'rotate', label: '旋转验证码', count: 2560 },
                    { type: 'number', label: '数字验证码', count: 1240 },
                    { type: 'math', label: '算术验证码', count: 890 }
                ];
            }

            function generateMockResultStats() {
                return [
                    { result: '通过', count: 10500 },
                    { result: '失败', count: 450 },
                    { result: '拦截', count: 320 }
                ];
            }

            function generateMockIpRanking() {
                const ips = [];
                const statuses = ['正常', '正常', '正常', '可疑', '可疑', '已封禁'];
                for (let i = 0; i < 10; i++) {
                    const total = Math.floor(Math.random() * 5000) + 100;
                    const verified = Math.floor(total * (0.8 + Math.random() * 0.2));
                    ips.push({
                        ip: `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`,
                        total: total,
                        verified: verified,
                        success_rate: ((verified / total) * 100).toFixed(1),
                        status: statuses[Math.floor(Math.random() * statuses.length)]
                    });
                }
                return ips.sort((a, b) => b.total - a.total);
            }

            function exportData() {
                const format = document.getElementById('export-format').value;
                const data = {
                    summary: {
                        total: document.getElementById('stat-total').textContent,
                        successRate: document.getElementById('stat-success-rate').textContent,
                        blocked: document.getElementById('stat-blocked').textContent,
                        avgTime: document.getElementById('stat-avg-time').textContent
                    },
                    trend: currentTrendData,
                    distribution: currentDistributionData,
                    results: currentResultData
                };

                if (format === 'json') {
                    ExportHelper.downloadJSON(data, 'captchax_stats_' + new Date().toISOString().split('T')[0]);
                } else if (format === 'csv') {
                    const csvRows = [['指标', '数值']];
                    csvRows.push(['总验证量', data.summary.total]);
                    csvRows.push(['验证成功率', data.summary.successRate]);
                    csvRows.push(['总拦截量', data.summary.blocked]);
                    csvRows.push(['平均响应时间', data.summary.avgTime]);
                    csvRows.push([], ['时间', '验证成功', '拦截']);

                    if (currentTrendData) {
                        currentTrendData.forEach(d => {
                            csvRows.push([d.time, d.verified, d.rejected]);
                        });
                    }

                    const BOM = '\uFEFF';
                    const csvContent = BOM + csvRows.map(r => r.join(',')).join('\n');
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
                    ExportHelper.downloadBlob(blob, 'captchax_stats_' + new Date().toISOString().split('T')[0] + '.csv');
                } else {
                    AdminUI.showToast('Excel导出功能开发中', 'info');
                    return;
                }

                AdminUI.showToast('导出成功', 'success');
            }

            document.getElementById('trend-period').addEventListener('change', async function() {
                const hours = parseInt(this.value);
                try {
                    const trend = await AdminApi.stats.getTrend(hours);
                    currentTrendData = trend;
                    AdminCharts.initTrendChart('trend-chart', trend);
                } catch (error) {
                    AdminCharts.initTrendChart('trend-chart', generateMockTrendData());
                    AdminUI.showToast('数据加载失败', 'error');
                }
            });

            document.getElementById('export-btn').addEventListener('click', exportData);
            document.getElementById('export-distribution-btn').addEventListener('click', function() {
                if (currentDistributionData) {
                    ExportHelper.downloadCSV(currentDistributionData, 'captcha_distribution', [
                        { key: 'label', title: '类型' },
                        { key: 'count', title: '数量' }
                    ]);
                }
            });

            loadStats();

            RealtimeUpdater.start('stats', loadStats, 60000);
        });
    </script>
</body>
</html>
