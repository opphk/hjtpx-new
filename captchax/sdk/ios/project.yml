name: CaptchaX iOS SDK

xcrun: 15.0

options:
  bundleIdPrefix: com.captchax
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  CaptchaX:
    type: framework
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/CaptchaX
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captchax.sdk
        PRODUCT_NAME: CaptchaX
        INFOPLIST_KEY_CFBundleDisplayName: CaptchaX
        DEFINES_MODULE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
    dependencies:
      - package: SnapKit

  CaptchaXObjC:
    type: framework
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/CaptchaXObjC
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captchax.sdk.objc
        PRODUCT_NAME: CaptchaXObjC
        DEFINES_MODULE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: CaptchaX

  SwiftUIExample:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Examples/SwiftUIExample
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captchax.example.swiftui
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    dependencies:
      - target: CaptchaX
    postCompileScripts:
      - script: |
          # SwiftUI Example build complete
        name: Build Complete

  UIKitExample:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Examples/UIKitExample
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captchax.example.uikit
    dependencies:
      - target: CaptchaX

  CaptchaXTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/CaptchaXTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captchax.sdk.tests
    dependencies:
      - target: CaptchaX

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"

schemes:
  CaptchaX:
    build:
      targets:
        CaptchaX: all
        CaptchaXObjC: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CaptchaXTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  SwiftUIExample:
    build:
      targets:
        SwiftUIExample: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  UIKitExample:
    build:
      targets:
        UIKitExample: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
