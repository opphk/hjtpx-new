## 3. 中间件

### 3.1 响应格式化中间件

**文件位置**: `src/backend/middleware/responseFormatter.js`

统一 API 响应格式，提供便捷的响应方法。

**使用方法**：

```javascript
// 成功响应
res.success(data, message, statusCode);

// 错误响应
res.error(message, statusCode, code, details);

// 创建资源响应
res.created(data, message);

// 无内容响应
res.noContent();

// 404 响应
res.notFound(message);

// 401 响应
res.unauthorized(message);

// 403 响应
res.forbidden(message);

// 400 响应
res.badRequest(message, details);

// 429 响应
res.tooManyRequests(message, retryAfter);
```

**响应格式**：

成功响应：

```json
{
  "success": true,
  "data": {},
  "message": "Success",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

错误响应：

```json
{
  "success": false,
  "error": {
    "code": "ERROR_CODE",
    "message": "Error message",
    "details": {}
  },
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

### 3.2 日志中间件

**文件位置**: `src/backend/middleware/logger.js`

记录所有 HTTP 请求和响应信息。

**功能特性**：

- 自动生成请求 ID
- 记录请求方法、URL、路径、查询参数
- 记录客户端 IP 和 User-Agent
- 记录响应时间
- 记录用户 ID（如果已认证）
- 支持不同日志级别（info、warn、error）

**日志格式**：

```json
{
  "requestId": "req_1620987600000_abc123",
  "timestamp": "2026-05-14T10:30:00.000Z",
  "method": "POST",
  "url": "/api/v1/auth/login",
  "path": "/api/v1/auth/login",
  "query": {},
  "params": {},
  "ip": "192.168.1.1",
  "userAgent": "Mozilla/5.0...",
  "userId": 1,
  "contentType": "application/json",
  "contentLength": "125",
  "duration": "150ms",
  "statusCode": 200
}
```

**导出函数**：

```javascript
const { logger, logError, logWarning, logInfo } = require('./middleware/logger');

// 应用到 Express 应用
app.use(logger);

// 记录错误
logError(error, req, { context: 'additional info' });

// 记录警告
logWarning('Something needs attention', { detail: 'value' });

// 记录信息
logInfo('Operation completed', { id: 123 });
```

### 3.3 限流中间件

**文件位置**: `src/backend/middleware/rateLimiter.js`

提供多层次限流保护。

**限流策略**：

| 中间件 | 窗口时间 | 最大请求数 | 适用场景 |
|--------|----------|------------|----------|
| ipRateLimiter | 15 分钟 | 100 | 通用 API 保护 |
| userRateLimiter | 15 分钟 | 200 | 已认证用户 |
| strictRateLimiter | 1 分钟 | 10 | 敏感操作 |
| authRateLimiter | 15 分钟 | 5 | 登录尝试（仅计数失败请求） |

**使用方法**：

```javascript
const { ipRateLimiter, userRateLimiter, strictRateLimiter, authRateLimiter } = require('./middleware/rateLimiter');

// 应用到路由
app.use('/api', ipRateLimiter);
app.use('/api/v1/users', userRateLimiter);
app.post('/api/v1/auth/login', authRateLimiter);
app.post('/api/v1/admin/delete-all', strictRateLimiter);
```

**限流响应**：

```json
{
  "success": false,
  "error": {
    "code": "TOO_MANY_REQUESTS",
    "message": "Too many requests, please try again later.",
    "retryAfter": 60
  }
}
```

### 3.4 CORS 中间件

**文件位置**: `src/backend/middleware/cors.js`

配置跨域资源共享策略。

**配置选项**：

| 选项 | 值 | 说明 |
|------|-----|------|
| credentials | true | 允许携带凭证 |
| methods | GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD | 允许的 HTTP 方法 |
| allowedHeaders | Content-Type, Authorization, X-Requested-With 等 | 允许的请求头 |
| exposedHeaders | X-Request-ID, X-Response-Time, X-Total-Count 等 | 允许的响应头 |
| maxAge | 86400 | 预检请求缓存时间（秒） |

**允许的来源**：

- 开发环境：所有 localhost 地址
- 生产环境：由 `ALLOWED_ORIGINS` 环境变量配置

**使用方法**：

```javascript
const { corsMiddleware } = require('./middleware/cors');
app.use(corsMiddleware);
```

### 3.5 验证中间件

**文件位置**: `src/backend/middleware/validator.js`

使用 Joi 进行请求数据验证。

**使用方法**：

```javascript
const validator = require('./middleware/validator');

// 验证请求体
router.post('/endpoint', validator('userSchema', 'body'), handler);

// 验证查询参数
router.get('/endpoint', validator('updateUserSchema', 'query'), handler);

// 验证路径参数
router.get('/endpoint/:id', validator('idSchema', 'params'), handler);
```

## 4. 验证规则

### 4.1 用户注册规则

**Schema 名称**: `userSchema`

| 字段 | 类型 | 必填 | 约束 | 错误信息 |
|------|------|------|------|----------|
| email | string | 是 | 有效的邮箱格式 | "请提供有效的邮箱地址" |
| name | string | 是 | 2-100 个字符 | "名称必须至少2个字符" / "名称不能超过100个字符" |
| password | string | 是 | 8-128 个字符，包含大小写字母和数字 | "密码必须至少8个字符" / "密码必须包含至少一个大写字母、一个小区字母和一个数字" |

### 4.2 登录规则

**Schema 名称**: `loginSchema`

| 字段 | 类型 | 必填 | 约束 | 错误信息 |
|------|------|------|------|----------|
| email | string | 是 | 有效的邮箱格式 | "请提供有效的邮箱地址" |
| password | string | 是 | 1-128 个字符 | "密码是必填项" |

### 4.3 用户更新规则

**Schema 名称**: `updateUserSchema`

所有字段均为可选，但至少需要提供一个字段进行更新。

| 字段 | 类型 | 约束 | 错误信息 |
|------|------|------|----------|
| email | string | 有效的邮箱格式 | "请提供有效的邮箱地址" |
| name | string | 2-100 个字符 | "名称必须至少2个字符" / "名称不能超过100个字符" |
| password | string | 8-128 个字符，包含大小写字母和数字 | "密码必须至少8个字符" / "密码必须包含至少一个大写字母、一个小区字母和一个数字" |

### 4.4 密码重置规则

**Schema 名称**: `forgotPasswordSchema`

| 字段 | 类型 | 必填 | 约束 | 错误信息 |
|------|------|------|------|----------|
| email | string | 是 | 有效的邮箱格式 | "请提供有效的邮箱地址" |

**Schema 名称**: `resetPasswordSchema`

| 字段 | 类型 | 必填 | 约束 | 错误信息 |
|------|------|------|------|----------|
| token | string | 是 | 32-128 个字符 | "重置令牌无效" |
| newPassword | string | 是 | 8-128 个字符，包含大小写字母、数字和特殊字符 | "密码必须至少8个字符" / "密码必须包含至少一个大写字母、一个小区字母、一个数字和一个特殊字符" |

## 5. 错误处理

### 5.1 HTTP 状态码

| 状态码 | 名称 | 使用场景 |
|--------|------|----------|
| 200 | OK | 请求成功 |
| 201 | Created | 资源创建成功 |
| 204 | No Content | 请求成功，无返回内容 |
| 400 | Bad Request | 请求参数错误 |
| 401 | Unauthorized | 未认证或认证失败 |
| 403 | Forbidden | 无访问权限 |
| 404 | Not Found | 资源不存在 |
| 429 | Too Many Requests | 请求过于频繁 |
| 500 | Internal Server Error | 服务器内部错误 |
| 503 | Service Unavailable | 服务不可用 |

### 5.2 错误码

| 错误码 | 说明 | HTTP 状态码 |
|--------|------|-------------|
| VALIDATION_ERROR | 请求验证失败 | 400 |
| UNAUTHORIZED | 未授权访问 | 401 |
| FORBIDDEN | 禁止访问 | 403 |
| NOT_FOUND | 资源未找到 | 404 |
| TOO_MANY_REQUESTS | 请求频率超限 | 429 |
| INTERNAL_ERROR | 服务器内部错误 | 500 |
| BAD_REQUEST | 错误的请求 | 400 |
| AUTH_ERROR | 认证错误 | 401 |
| REGISTRATION_ERROR | 注册错误 | 400 |
| FETCH_USERS_ERROR | 获取用户列表错误 | 500 |
| FETCH_USER_ERROR | 获取用户信息错误 | 500 |
| CREATE_USER_ERROR | 创建用户错误 | 400 |
| UPDATE_USER_ERROR | 更新用户错误 | 400 |
| DELETE_USER_ERROR | 删除用户错误 | 500 |
| FORGOT_PASSWORD_ERROR | 密码重置请求错误 | 500 |
| RESET_PASSWORD_ERROR | 密码重置错误 | 400 |

