  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

### 2.4 用户管理接口

**权限说明**：

| 接口 | 所需权限 | 说明 |
|------|----------|------|
| GET /api/v1/users | admin | 仅管理员可访问 |
| GET /api/v1/users/:id | admin, user（仅本人） | 管理员可访问任意用户，普通用户仅可访问本人 |
| POST /api/v1/users | admin | 仅管理员可创建用户 |
| PUT /api/v1/users/:id | admin, user（仅本人） | 管理员可更新任意用户，普通用户仅可更新本人（非管理员字段） |
| DELETE /api/v1/users/:id | admin | 仅管理员可删除用户 |

#### GET /api/v1/users

获取所有用户列表（需要管理员权限）。

**权限**：admin

**响应示例**：

```json
{
  "success": true,
  "data": [
    {
      "id": 1,
      "email": "user@example.com",
      "name": "John Doe",
      "role": "user",
      "created_at": "2026-05-14T10:30:00.000Z"
    }
  ],
  "message": "Users retrieved successfully",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### GET /api/v1/users/:id

根据 ID 获取指定用户。

**路径参数**：

| 参数 | 类型 | 说明 |
|------|------|------|
| id | integer | 用户 ID |

**响应示例**：

```json
{
  "success": true,
  "data": {
    "id": 1,
    "email": "user@example.com",
    "name": "John Doe",
    "role": "user",
    "created_at": "2026-05-14T10:30:00.000Z"
  },
  "message": "User retrieved successfully",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### POST /api/v1/users

创建新用户。

**请求参数**：

| 参数 | 类型 | 必填 | 说明 |
|------|------|------|------|
| email | string | 是 | 用户邮箱 |
| name | string | 是 | 用户名称 |
| password | string | 是 | 用户密码 |

**响应示例**：

```json
{
  "success": true,
  "data": {
    "id": 1,
    "email": "user@example.com",
    "name": "John Doe",
    "role": "user",
    "created_at": "2026-05-14T10:30:00.000Z"
  },
  "message": "User created successfully",
