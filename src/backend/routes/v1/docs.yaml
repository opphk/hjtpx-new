### 8.1 运行测试

```bash
# 运行所有测试
npm test

# 运行测试覆盖率
npm run test:coverage

# 运行单元测试
npm run test:unit

# 运行 API 测试
npm run test:api

# 监听模式运行测试
npm run test:watch
```

### 8.2 测试文件结构

```
tests/
├── unit/
│   └── basic.test.js           # 基础单元测试
└── api/
    └── health.test.js          # 健康检查 API 测试
```

### 8.3 测试示例

```javascript
const request = require('supertest');
const app = require('../../src/index');

describe('Health API', () => {
  test('GET /api/v1/health should return healthy status', async () => {
    const response = await request(app)
      .get('/api/v1/health')
      .expect('Content-Type', /json/)
      .expect(200);

    expect(response.body.success).toBe(true);
    expect(response.body.data.status).toBe('healthy');
  });

  test('GET /api/v1/health/detailed should return detailed status', async () => {
    const response = await request(app)
      .get('/api/v1/health/detailed')
      .expect('Content-Type', /json/)
      .expect(200);

    expect(response.body.success).toBe(true);
    expect(response.body.data).toHaveProperty('checks');
  });
});
```

## 9. 部署指南

### 9.1 开发环境

```bash
# 安装依赖
npm install

# 复制环境变量文件
cp config/.env.example .env

# 启动开发服务器
npm run dev
```

### 9.2 生产环境

```bash
# 安装生产依赖
npm install --production

# 设置环境变量
export NODE_ENV=production
export PORT=3000

# 启动服务
npm start
```

### 9.3 使用 PM2 部署

```bash
# 安装 PM2
npm install -g pm2

# 启动服务
pm2 start src/index.js --name hjtpx

# 查看日志
pm2 logs hjtpx

# 重启服务
pm2 restart hjtpx
```

