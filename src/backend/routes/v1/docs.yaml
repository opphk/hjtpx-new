# HJTPX API 文档

## 1. 项目概述

### 1.1 项目简介

HJTPX 是一个现代化的全栈应用程序，提供 RESTful API 接口服务。本文档详细描述了 API 的架构设计、端点定义、中间件功能、验证规则以及安全特性。

### 1.2 技术架构

本项目采用以下技术栈构建：

| 组件 | 技术 | 版本 | 说明 |
|------|------|------|------|
| 后端框架 | Express.js | ^4.18.2 | 轻量级 Node.js Web 框架 |
| 数据库 | PostgreSQL | 8.11.0 | 关系型数据库 |
| 缓存 | Redis | ^4.6.0 | 内存数据库与缓存 |
| 认证 | JWT | ^9.0.0 | JSON Web Token 认证 |
| 验证 | Joi | ^17.11.0 | 数据验证库 |
| 限流 | express-rate-limit | ^7.1.5 | API 请求限流 |
| 密码加密 | bcrypt | ^5.1.1 | 密码哈希处理 |

### 1.3 项目结构

```
src/
├── index.js                          # 应用入口
└── backend/
    ├── middleware/                   # 中间件
    │   ├── auth.js                   # 认证中间件
    │   ├── cors.js                   # CORS 配置
    │   ├── errorHandler.js           # 错误处理
    │   ├── logger.js                 # 日志记录
    │   ├── rateLimiter.js            # 限流控制
    │   ├── responseFormatter.js      # 响应格式化
    │   └── validator.js              # 数据验证
    ├── routes/                       # 路由定义
    │   ├── v1/                       # API v1 版本
    │   │   ├── index.js              # 路由聚合
    │   │   ├── health.js             # 健康检查
    │   │   ├── users.js              # 用户管理
    │   │   └── auth.js               # 认证接口
    │   └── users.js                  # 旧版用户路由
    ├── services/                     # 业务逻辑
    │   ├── authService.js            # 认证服务
    │   └── userService.js            # 用户服务
    └── utils/                        # 工具函数
        └── validationRules.js         # 验证规则
```

## 2. API 端点

### 2.1 API 版本控制

所有 API 端点统一使用版本控制，当前版本为 **v1**。

**基础 URL**: `/api/v1`

### 2.2 健康检查

#### GET /api/v1/health

基础健康检查接口，用于验证服务是否正常运行。

**响应示例**：

```json
{
  "success": true,
  "data": {
    "status": "healthy",
    "service": "HJTPX API",
    "version": "1.0.0",
    "timestamp": "2026-05-14T10:30:00.000Z",
    "uptime": 3600.5,
    "environment": "development"
  }
}
```

#### GET /api/v1/health/detailed

详细健康检查接口，返回所有依赖服务的状态。

**响应示例**：

```json
{
  "success": true,
  "data": {
    "status": "healthy",
    "timestamp": "2026-05-14T10:30:00.000Z",
    "service": "HJTPX API",
    "version": "1.0.0",
    "uptime": 3600.5,
    "environment": "development",
    "checks": {
      "database": {
        "status": "healthy",
        "message": "Database connection is healthy",
        "responseTime": "15ms"
      },
      "redis": {
        "status": "healthy",
        "message": "Redis connection is healthy",
        "responseTime": "5ms"
      },
      "memory": {
        "status": "healthy",
        "message": "Memory usage is normal",
        "usage": {
          "used": 45,
          "total": 128,
          "unit": "MB"
        }
      },
      "cpu": {
        "status": "healthy",
        "message": "CPU usage is normal",
        "loadAverage": [1.2, 0.8, 0.5]
      }
    },
    "responseTime": "25ms"
  }
}
```

**健康状态说明**：

| 状态 | HTTP 状态码 | 说明 |
|------|-------------|------|
| healthy | 200 | 所有服务正常运行 |
| degraded | 200 | 部分服务降级，但核心功能可用 |
| unhealthy | 503 | 关键服务不可用 |

### 2.3 认证接口

#### POST /api/v1/auth/login

用户登录接口。

**请求参数**：

| 参数 | 类型 | 必填 | 说明 |
|------|------|------|------|
| email | string | 是 | 用户邮箱地址 |
| password | string | 是 | 用户密码 |

**请求示例**：

```json
{
  "email": "user@example.com",
  "password": "SecurePass123"
}
```

**响应示例**：

```json
{
  "success": true,
  "data": {
    "user": {
      "id": 1,
      "email": "user@example.com",
      "name": "John Doe",
      "role": "user"
    },
    "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
    "expiresIn": "7d"
  },
  "message": "Login successful",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

**错误响应**：

```json
{
  "success": false,
  "error": {
    "code": "UNAUTHORIZED",
    "message": "Invalid email or password"
  },
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### POST /api/v1/auth/register

用户注册接口。

**请求参数**：

| 参数 | 类型 | 必填 | 说明 |
|------|------|------|------|
| email | string | 是 | 用户邮箱（必须是有效邮箱格式） |
| name | string | 是 | 用户名称（2-100个字符） |
| password | string | 是 | 用户密码（至少8个字符，包含大小写字母和数字） |

**响应示例**：

```json
{
  "success": true,
  "data": {
    "user": {
      "id": 1,
      "email": "user@example.com",
      "name": "John Doe",
      "role": "user"
    },
    "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
    "expiresIn": "7d"
  },
  "message": "Registration successful",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### POST /api/v1/auth/verify

验证 JWT Token 有效性。

**请求参数**：

| 参数 | 类型 | 必填 | 说明 |
|------|------|------|------|
| token | string | 是 | JWT Token |

**响应示例**：

```json
{
  "success": true,
  "data": {
    "valid": true,
    "user": {
      "id": 1,
      "email": "user@example.com",
      "role": "user"
    }
  },
  "message": "Token is valid",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### POST /api/v1/auth/refresh

刷新 JWT Token。

**请求参数**：

| 参数 | 类型 | 必填 | 说明 |
|------|------|------|------|
| token | string | 是 | 当前有效的 JWT Token |

**响应示例**：

```json
{
  "success": true,
  "data": {
    "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
    "expiresIn": "7d"
  },
  "message": "Token refreshed successfully",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### POST /api/v1/auth/logout

用户登出接口。

**响应示例**：

```json
{
  "success": true,
  "data": {
    "message": "Logout successful"
  },
  "message": "Logout successful",
  "timestamp": "2026-05-14T10:30:00.000Z"
}
```

#### POST /api/v1/password/forgot

请求密码重置邮件。

**请求参数**：

| 参数 | 类型 | 必填 | 说明 |
|------|------|------|------|
| email | string | 是 | 用户邮箱地址 |

**请求示例**：

```json
{
  "email": "user@example.com"
}
```

**响应示例**：

```json
{
