## 6. 安全特性

### 6.1 认证机制

- 使用 JWT (JSON Web Token) 进行身份认证
- Token 默认有效期为 7 天
- 支持 Token 刷新机制
- 密码使用 bcrypt 进行哈希存储

### 6.2 限流保护

- IP 级别限流：防止恶意 IP 攻击
- 用户级别限流：防止单个用户过度使用
- 认证限流：防止暴力破解登录

### 6.3 CORS 配置

- 支持跨域请求
- 可配置允许的源
- 支持凭证传递

### 6.4 输入验证

- 所有输入数据使用 Joi 进行验证
- 防止 SQL 注入
- 防止 XSS 攻击

### 6.5 基于角色的访问控制（RBAC）

系统实现了基于角色的访问控制（Role-Based Access Control）。

#### 角色定义

| 角色 | 层级 | 说明 |
|------|------|------|
| admin | 3 | 管理员，拥有所有权限 |
| user | 2 | 普通用户，拥有基本权限 |
| guest | 1 | 访客，仅有最低权限 |

#### 角色层级说明

角色层级决定了权限的继承关系：
- admin 可以访问所有资源
- user 可以访问 user 和 guest 级别的资源
- guest 只能访问 guest 级别的资源

#### 使用方法

```javascript
const { checkRole, ROLES } = require('./middleware/rbac');

// 检查特定角色
router.get('/admin-only', auth, checkRole(ROLES.ADMIN), handler);

// 检查多个角色（满足任一即可）
router.get('/users', auth, checkRole(ROLES.ADMIN, ROLES.USER), handler);

// 检查最小角色级别
router.get('/content', auth, checkMinimumRole(ROLES.USER), handler);

// 检查特定权限
router.get('/data', auth, checkPermission('read:data'), handler);
```

#### 辅助函数

| 函数 | 说明 |
|------|------|
| requireAdmin | 仅允许管理员访问 |
| requireUser | 仅允许用户和更高角色访问 |
| requireGuest | 仅允许访客和更高角色访问 |
| isAdmin | 检查当前用户是否为管理员 |
| isUser | 检查当前用户是否为普通用户或更高角色 |
| isGuest | 检查当前用户是否为访客或更高角色 |

### 6.6 会话管理

系统实现了增强的会话管理功能，支持多设备登录控制和登录历史记录。

#### 主要功能

- **多设备登录控制**：限制用户同时活跃的会话数量（默认最多5个会话）
- **登录历史记录**：记录所有登录尝试，包括成功和失败的尝试
- **会话过期处理**：自动清理过期会话
- **设备信息跟踪**：记录登录设备信息（IP、浏览器、操作系统等）

#### 会话表结构

| 字段 | 类型 | 说明 |
|------|------|------|
| id | UUID | 会话唯一标识符 |
| user_id | UUID | 关联的用户ID |
| token | VARCHAR(500) | 会话令牌 |
| expires_at | TIMESTAMP | 过期时间 |
| device_info | JSONB | 设备信息 |
| ip_address | INET | IP地址 |
| user_agent | TEXT | 用户代理字符串 |
| is_revoked | BOOLEAN | 是否已撤销 |
| last_activity | TIMESTAMP | 最后活动时间 |
| is_current | BOOLEAN | 是否为当前会话 |
| created_at | TIMESTAMP | 创建时间 |

#### 登录历史表结构

| 字段 | 类型 | 说明 |
|------|------|------|
| id | UUID | 记录唯一标识符 |
| user_id | UUID | 关联的用户ID |
| action | VARCHAR(50) | 操作类型（login/logout/failed） |
| ip_address | INET | IP地址 |
| user_agent | TEXT | 用户代理字符串 |
| device_info | JSONB | 设备信息 |
| success | BOOLEAN | 是否成功 |
| created_at | TIMESTAMP | 创建时间 |

#### 账户锁定功能

系统实现了账户锁定功能以防止暴力破解：
- 连续5次登录失败后账户将被锁定15分钟
- 锁定期间无法尝试登录
- 成功登录后失败计数将被重置

