<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1890ff">
    <title>离线模式 - HJTPX 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
            padding: 10px 20px;
            background: #fff3cd;
            border-radius: 10px;
            color: #856404;
            font-size: 14px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #ffc107;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .tips {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
        }

        .tips h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            font-size: 12px;
            color: #666;
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }

        .tips li:before {
            content: "•";
            position: absolute;
            left: 5px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>您现在处于离线模式</h1>
        <p>无法连接到网络，请检查您的网络连接后重试。</p>
        
        <div class="status">
            <div class="status-indicator"></div>
            <span>正在检测网络状态...</span>
        </div>

        <button id="retryBtn">重试连接</button>

        <div class="tips">
            <h3>提示：</h3>
            <ul>
                <li>请检查 Wi-Fi 或移动数据是否已开启</li>
                <li>尝试切换到其他网络</li>
                <li>检查是否开启了飞行模式</li>
            </ul>
        </div>
    </div>

    <script>
        const retryBtn = document.getElementById('retryBtn');
        const status = document.querySelector('.status');
        const statusIndicator = document.querySelector('.status-indicator');
        const statusText = document.querySelector('.status span');

        function updateOnlineStatus() {
            if (navigator.onLine) {
                status.style.background = '#d4edda';
                status.style.color = '#155724';
                statusIndicator.style.background = '#28a745';
                statusText.textContent = '网络已连接！正在跳转...';
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                status.style.background = '#fff3cd';
                status.style.color = '#856404';
                statusIndicator.style.background = '#ffc107';
                statusText.textContent = '未检测到网络连接';
            }
        }

        retryBtn.addEventListener('click', () => {
            retryBtn.textContent = '正在检查...';
            retryBtn.disabled = true;
            setTimeout(() => {
                updateOnlineStatus();
                retryBtn.textContent = '重试连接';
                retryBtn.disabled = false;
            }, 1000);
        });

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        updateOnlineStatus();
    </script>
</body>
</html>
